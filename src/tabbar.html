<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root{
    --bg: #141915;
    --bg-tab: #1b211c;
    --bg-tab-active: #232b24;
    --bg-panel: #161c17;
    --line: #2a342c;
    --line-bright: #3c4a3e;
    --text: #d9e6db;
    --text-dim: #7e9484;
    --text-faint: #4d5e51;
    --amber: #e8a33d;
    --red: #e2625b;
  }
  *{box-sizing:border-box; -webkit-app-region:no-drag;}
  html,body{
    margin:0; padding:0;
    background:var(--bg);
    font-family:'Segoe UI', system-ui, sans-serif;
    overflow:hidden;
    user-select:none;
    height:100vh;
  }
  #shell{
    display:flex;
    flex-direction:column;
    height:100vh;
  }
  #tabbar{
    height:44px;
    flex-shrink:0;
    display:flex;
    align-items:stretch;
    background:var(--bg);
    border-bottom:1px solid var(--line);
    -webkit-app-region:drag;
    padding:0 4px;
  }
  #tabs{
    display:flex;
    align-items:stretch;
    flex:1;
    overflow-x:auto;
    -webkit-app-region:no-drag;
  }
  .tab{
    display:flex;
    align-items:center;
    gap:8px;
    padding:0 12px;
    margin:6px 3px;
    border-radius:6px;
    background:var(--bg-tab);
    color:var(--text-dim);
    font-size:12.5px;
    cursor:pointer;
    white-space:nowrap;
    border:1px solid transparent;
    min-width:84px;
    position:relative;
  }
  .tab:hover{ background:var(--bg-tab-active); color:var(--text); }
  .tab.active{ background:var(--bg-tab-active); color:var(--text); border-color:var(--line-bright); }
  .tab.limit-hit{ border-color:var(--red); }
  .tab .dot{ width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .tab .label{ flex:1; overflow:hidden; text-overflow:ellipsis; }
  .tab .close{ color:var(--text-dim); font-size:14px; padding:0 2px; border-radius:3px; line-height:1; }
  .tab .close:hover{ color:var(--text); background:rgba(255,255,255,0.08); }
  .tab .flag{ font-size:10px; color:var(--red); }

  #controls{ display:flex; align-items:center; gap:4px; padding:0 8px; -webkit-app-region:no-drag; }
  .ctrl-btn{
    background:transparent; border:1px solid var(--line); color:var(--text-dim);
    border-radius:6px; padding:6px 10px; font-size:12px; cursor:pointer;
  }
  .ctrl-btn:hover{ color:var(--text); border-color:var(--amber); }
  .ctrl-btn.panel-toggle.active{ color:var(--amber); border-color:var(--amber); }

  #body{ flex:1; display:flex; overflow:hidden; }
  #webview-space{ flex:1; }

  #panel{
    width:360px;
    flex-shrink:0;
    background:var(--bg-panel);
    border-left:1px solid var(--line);
    display:flex;
    flex-direction:column;
    padding:16px;
    gap:14px;
    overflow-y:auto;
  }
  #panel.hidden{ display:none; }

  .panel-section h3{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--text-faint);
    margin:0 0 8px;
    font-weight:600;
  }
  textarea{
    width:100%;
    background:var(--bg-tab);
    border:1px solid var(--line);
    border-radius:6px;
    color:var(--text);
    font-family:'SF Mono', Consolas, monospace;
    font-size:12.5px;
    line-height:1.55;
    padding:10px;
    resize:vertical;
  }
  textarea:focus{ outline:none; border-color:var(--line-bright); }
  textarea::placeholder{ color:var(--text-faint); }
  #context-area{ min-height:160px; }
  #handoff-area{ min-height:90px; color:var(--text-dim); }

  .panel-actions{ display:flex; gap:6px; flex-wrap:wrap; }
  .pbtn{
    font-family:'SF Mono', Consolas, monospace;
    font-size:11px;
    padding:7px 10px;
    border-radius:5px;
    border:1px solid var(--line-bright);
    background:var(--bg-tab);
    color:var(--text);
    cursor:pointer;
  }
  .pbtn:hover{ border-color:var(--amber); color:var(--amber); }
  .pbtn.primary{ background:#6b5226; border-color:var(--amber); color:#1a1206; font-weight:600; }
  .pbtn.warn{ border-color:var(--red); color:var(--red); }

  .hint{ font-size:11px; color:var(--text-faint); line-height:1.5; }

  #log-list{ display:flex; flex-direction:column; max-height:220px; overflow-y:auto; }
  .log-entry{ font-size:11.5px; padding:7px 0; border-bottom:1px solid var(--line); }
  .log-entry:last-child{ border-bottom:none; }
  .log-time{ color:var(--text-faint); font-family:'SF Mono', Consolas, monospace; font-size:10px; margin-top:2px; }
  .log-empty{ color:var(--text-faint); font-size:11.5px; font-style:italic; }
</style>
</head>
<body>

<div id="shell">
  <div id="tabbar">
    <div id="tabs"></div>
    <div id="controls">
      <button class="ctrl-btn" id="reload-btn" title="Reload current account">⟳ Reload</button>
      <button class="ctrl-btn panel-toggle" id="panel-toggle-btn" title="Toggle shared notes panel">☰ Notes</button>
      <button class="ctrl-btn" id="add-btn" title="Add another account">+ Add account</button>
    </div>
  </div>

  <div id="body">
    <div id="webview-space"></div>

    <div id="panel" class="hidden">
      <div class="panel-section">
        <h3>Current account</h3>
        <div id="current-account-info" style="font-size:12.5px; color:var(--text-dim);">—</div>
        <div class="panel-actions" style="margin-top:8px;">
          <button class="pbtn warn" id="mark-limit-btn">Mark this one: limit hit</button>
          <button class="pbtn" id="mark-ready-btn">Mark ready again</button>
        </div>
      </div>

      <div class="panel-section">
        <h3>Shared task context</h3>
        <p class="hint" style="margin-top:-4px; margin-bottom:8px;">
          Visible from every tab. Update it as you work so any account you switch to has the full picture.
        </p>
        <textarea id="context-area" placeholder="e.g. VAPT report for client X. Findings 1-6 drafted. Working on SQLi remediation section. Next: CSRF, then exec summary."></textarea>
      </div>

      <div class="panel-section">
        <h3>Handoff message</h3>
        <p class="hint" style="margin-top:-4px; margin-bottom:8px;">
          Builds a paste-ready message from the context above, naming the account you're switching from.
        </p>
        <textarea id="handoff-area" readonly></textarea>
        <div class="panel-actions" style="margin-top:8px;">
          <button class="pbtn primary" id="build-handoff-btn">Build handoff</button>
          <button class="pbtn" id="copy-handoff-btn">Copy</button>
        </div>
      </div>

      <div class="panel-section">
        <h3>Rotation log</h3>
        <div id="log-list"><div class="log-empty">No activity yet</div></div>
      </div>
    </div>
  </div>
</div>

<script>
  const tabsEl = document.getElementById('tabs');
  const panelEl = document.getElementById('panel');
  const panelToggleBtn = document.getElementById('panel-toggle-btn');
  const contextArea = document.getElementById('context-area');
  const handoffArea = document.getElementById('handoff-area');
  const logListEl = document.getElementById('log-list');
  const currentAccountInfo = document.getElementById('current-account-info');

  let currentAccounts = [];
  let currentActiveId = null;
  let panelOpen = false;
  let saveTimer = null;

  function renderTabs({ accounts, activeAccountId }) {
    currentAccounts = accounts;
    currentActiveId = activeAccountId;

    tabsEl.innerHTML = '';
    accounts.forEach(acc => {
      const tab = document.createElement('div');
      tab.className = 'tab' + (acc.id === activeAccountId ? ' active' : '') + (acc.limitHit ? ' limit-hit' : '');
      tab.innerHTML = `
        <span class="dot" style="background:${acc.color}"></span>
        <span class="label">${acc.label}</span>
        ${acc.limitHit ? '<span class="flag" title="Limit hit">⚠</span>' : ''}
        <span class="close" title="Remove account">×</span>
      `;
      tab.querySelector('.label').addEventListener('click', () => window.tabAPI.switchAccount(acc.id));
      tab.querySelector('.dot').addEventListener('click', () => window.tabAPI.switchAccount(acc.id));
      tab.addEventListener('dblclick', (e) => {
        if (e.target.classList.contains('close')) return;
        const newLabel = prompt('Rename account tab:', acc.label);
        if (newLabel) window.tabAPI.renameAccount(acc.id, newLabel);
      });
      tab.querySelector('.close').addEventListener('click', (e) => {
        e.stopPropagation();
        if (confirm(`Remove "${acc.label}"? This clears its login session.`)) {
          window.tabAPI.removeAccount(acc.id);
        }
      });
      tabsEl.appendChild(tab);
    });

    const active = accounts.find(a => a.id === activeAccountId);
    currentAccountInfo.textContent = active ? active.label + (active.limitHit ? ' (limit hit)' : ' (active)') : '—';
  }

  function renderNotes(notes) {
    if (document.activeElement !== contextArea) {
      contextArea.value = notes.context || '';
    }
    if (!notes.log || notes.log.length === 0) {
      logListEl.innerHTML = '<div class="log-empty">No activity yet</div>';
    } else {
      logListEl.innerHTML = '';
      notes.log.slice().reverse().slice(0, 30).forEach(entry => {
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.innerHTML = `<div>${entry.action}</div><div class="log-time">${entry.time}</div>`;
        logListEl.appendChild(div);
      });
    }
  }

  window.tabAPI.onAccountsUpdated(renderTabs);
  window.tabAPI.onNotesUpdated(renderNotes);

  window.tabAPI.getNotes().then(renderNotes);

  document.getElementById('add-btn').addEventListener('click', () => {
    const label = prompt('Name for the new account tab (e.g. "Claude 6"):', 'New account');
    if (label) window.tabAPI.addAccount(label);
  });

  document.getElementById('reload-btn').addEventListener('click', () => {
    window.tabAPI.reloadActive();
  });

  panelToggleBtn.addEventListener('click', () => {
    panelOpen = !panelOpen;
    panelEl.classList.toggle('hidden', !panelOpen);
    panelToggleBtn.classList.toggle('active', panelOpen);
    window.tabAPI.togglePanel(panelOpen);
  });

  contextArea.addEventListener('input', () => {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      window.tabAPI.saveContext(contextArea.value);
    }, 400);
  });

  document.getElementById('build-handoff-btn').addEventListener('click', () => {
    const active = currentAccounts.find(a => a.id === currentActiveId);
    const ctx = contextArea.value.trim();
    if (!ctx) {
      handoffArea.value = 'Add your task context above first.';
      return;
    }
    const fromName = active ? active.label : 'a previous account';
    handoffArea.value = `Continuing a task that was in progress on ${fromName} (session limit reached there). Current state:\n\n${ctx}\n\nPlease continue from here.`;
  });

  document.getElementById('copy-handoff-btn').addEventListener('click', async () => {
    if (!handoffArea.value.trim()) return;
    try {
      await navigator.clipboard.writeText(handoffArea.value);
    } catch (e) {
      handoffArea.select();
      document.execCommand('copy');
    }
  });

  document.getElementById('mark-limit-btn').addEventListener('click', () => {
    if (currentActiveId) window.tabAPI.markLimitHit(currentActiveId);
  });
  document.getElementById('mark-ready-btn').addEventListener('click', () => {
    if (currentActiveId) window.tabAPI.markReady(currentActiveId);
  });
</script>

</body>
</html>
